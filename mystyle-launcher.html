<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... | Enchanté'-Hair</title>
<script charset="utf-8" src="https://static.line-signon.com/API/liff/edge/2/sdk.js"></script>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    background: #f9f7f3; font-family: sans-serif;
  }
  .loader { text-align: center; padding: 2rem; }
  .spinner {
    width: 28px; height: 28px; margin: 0 auto 1rem;
    border: 2px solid #e8e2d8; border-top-color: #c9a84c;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .text { color: #8a7d6a; font-size: 0.8rem; line-height: 1.8; }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner" id="spinner"></div>
  <div class="text" id="status">読み込み中...</div>
</div>
<script>
var status = document.getElementById('status');

async function launch() {
  try {
    status.textContent = 'LIFF初期化中...';
    await liff.init({ liffId: '2009018401-5cKmnfRT' });
    
    status.textContent = 'ログイン確認中...';
    var uid = '';
    
    if (liff.isInClient()) {
      status.textContent = 'プロフィール取得中...';
      var profile = await liff.getProfile();
      uid = profile.userId;
    } else if (liff.isLoggedIn()) {
      status.textContent = 'プロフィール取得中...';
      var profile = await liff.getProfile();
      uid = profile.userId;
    }
    
    if (uid) {
      status.textContent = 'リダイレクト中...';
      window.location.replace('https://newtype3104-byte.github.io/enchante-hair/mystyle.html?uid=' + uid);
    } else {
      // LIFF内でログインされてない場合、ログイン試行
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
      } else {
        status.textContent = 'UIDを取得できませんでした';
      }
    }
  } catch(e) {
    status.textContent = 'エラー: ' + e.message;
    document.getElementById('spinner').style.display = 'none';
  }
}

launch();
</script>
</body>
</html>
