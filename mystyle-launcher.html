<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... | Enchanté'-Hair</title>
<script charset="utf-8" src="https://static.line-signon.com/API/liff/edge/2/sdk.js"></script>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    background: #f9f7f3; font-family: sans-serif;
  }
  .loader { text-align: center; }
  .spinner {
    width: 28px; height: 28px; margin: 0 auto 1rem;
    border: 2px solid #e8e2d8; border-top-color: #c9a84c;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .text { color: #8a7d6a; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <div class="text">読み込み中...</div>
</div>
<script>
async function launch() {
  try {
    await liff.init({ liffId: '2009018401-5cKmnfRT' });
    var uid = '';
    if (liff.isInClient() || liff.isLoggedIn()) {
      var profile = await liff.getProfile();
      uid = profile.userId;
    }
    if (uid) {
      // LIFF WebViewを閉じて外部ブラウザで開くのではなく、
      // 同じWebView内でリダイレクト（LIFFコンテキストを抜ける）
      window.location.replace('https://newtype3104-byte.github.io/enchante-hair/mystyle.html?uid=' + uid);
    } else {
      document.querySelector('.text').textContent = 'LINEログインが必要です';
    }
  } catch(e) {
    document.querySelector('.text').textContent = 'エラーが発生しました';
  }
}
launch();
</script>
</body>
</html>
