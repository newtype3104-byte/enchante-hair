<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空き状況 | ENCHANTE' HAIR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12; --card: #1a1a22; --gold: #c9a96e; --gold-light: #e8d5a8;
    --green: #4ade80; --green-bg: rgba(74,222,128,0.08); --red: #f87171;
    --red-bg: rgba(248,113,113,0.06); --text: #e8e8ec; --text-dim: #8888a0;
    --border: #2a2a38; --accent-blue: #60a5fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP','Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
  .header { text-align:center; padding:2.5rem 1rem 1rem; }
  .header::after { content:''; display:block; width:40px; height:2px; background:var(--gold); margin:1rem auto 0; }
  .logo { font-family:'Outfit',sans-serif; font-size:0.7rem; letter-spacing:0.35em; color:var(--gold); text-transform:uppercase; font-weight:300; }
  .page-title { font-size:1.5rem; font-weight:700; margin-top:0.5rem; }
  .updated { font-size:0.7rem; color:var(--text-dim); margin-top:0.75rem; }
  .loading { text-align:center; padding:4rem 1rem; color:var(--text-dim); font-size:0.85rem; }
  .loading-spinner { width:28px; height:28px; border:2.5px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-msg { text-align:center; padding:3rem 1rem; color:var(--red); font-size:0.85rem; display:none; }
  .menu-filter { padding:1rem 1rem 0; }
  .menu-label { font-size:0.65rem; letter-spacing:0.1em; color:var(--text-dim); text-transform:uppercase; margin-bottom:0.5rem; }
  .menu-chips { display:flex; gap:0.4rem; overflow-x:auto; padding-bottom:0.5rem; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .menu-chips::-webkit-scrollbar { display:none; }
  .chip { flex-shrink:0; padding:0.55rem 1rem; border-radius:100px; border:1.5px solid var(--border); background:rgba(255,255,255,0.03); color:var(--text); font-size:0.88rem; font-family:inherit; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .chip.active { background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:700; }
  .chip .chip-time { font-size:0.72rem; opacity:0.6; margin-left:0.25rem; }
  .schedule { padding:1rem; display:flex; flex-direction:column; gap:0.5rem; }
  .day-card { background:var(--card); border-radius:14px; overflow:hidden; border:1px solid transparent; animation:fadeUp 0.4s ease both; }
  .day-card:nth-child(1){animation-delay:0.0s} .day-card:nth-child(2){animation-delay:0.03s} .day-card:nth-child(3){animation-delay:0.06s} .day-card:nth-child(4){animation-delay:0.09s} .day-card:nth-child(5){animation-delay:0.12s} .day-card:nth-child(6){animation-delay:0.15s} .day-card:nth-child(7){animation-delay:0.18s} .day-card:nth-child(8){animation-delay:0.21s} .day-card:nth-child(9){animation-delay:0.24s} .day-card:nth-child(10){animation-delay:0.27s} .day-card:nth-child(11){animation-delay:0.30s} .day-card:nth-child(12){animation-delay:0.33s} .day-card:nth-child(13){animation-delay:0.36s} .day-card:nth-child(14){animation-delay:0.39s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .day-card.full { background:var(--red-bg); border-color:rgba(248,113,113,0.1); }
  .day-card.available { border-color:rgba(74,222,128,0.12); }
  .day-header { display:flex; align-items:center; justify-content:space-between; padding:0.9rem 1rem; }
  .day-left { display:flex; align-items:baseline; gap:0.6rem; }
  .day-date { font-family:'Outfit',sans-serif; font-size:1.6rem; font-weight:700; line-height:1; min-width:2ch; }
  .day-meta { display:flex; flex-direction:column; gap:0.1rem; }
  .day-dow { font-size:0.78rem; font-weight:600; color:var(--text); }
  .day-month { font-size:0.6rem; color:var(--text-dim); }
  .day-dow.sat { color:var(--accent-blue); } .day-dow.sun { color:var(--red); }
  .status-badge { font-size:0.68rem; font-weight:600; padding:0.25rem 0.7rem; border-radius:100px; }
  .status-badge.full { background:rgba(248,113,113,0.15); color:var(--red); }
  .status-badge.open { background:rgba(74,222,128,0.12); color:var(--green); }
  .slots { padding:0 1rem 0.9rem; display:flex; flex-wrap:wrap; gap:0.35rem; }
  .slot { display:inline-flex; align-items:center; gap:0.3rem; padding:0.4rem 0.75rem; background:rgba(255,255,255,0.04); border-radius:8px; font-size:0.82rem; font-family:'Outfit',sans-serif; font-weight:500; }
  .slot.highlight { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.2); }
  .slot-note { font-size:0.6rem; color:var(--gold-light); background:rgba(201,169,110,0.12); padding:0.15rem 0.4rem; border-radius:4px; font-family:'Noto Sans JP',sans-serif; }
  .slot-duration { display:inline-block; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .slot-duration.long { background:var(--green); } .slot-duration.medium { background:var(--gold); } .slot-duration.short { background:var(--red); }
  .footer { text-align:center; padding:2rem 1rem 3rem; color:var(--text-dim); font-size:0.7rem; line-height:1.8; }
  .legend { display:flex; justify-content:center; gap:1rem; padding:0.5rem 1rem 0; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:0.3rem; font-size:0.65rem; color:var(--text-dim); }
  .legend-dot { width:6px; height:6px; border-radius:50%; }
  .today-indicator { font-size:0.55rem; background:var(--gold); color:var(--bg); padding:0.1rem 0.4rem; border-radius:4px; font-weight:700; margin-left:0.3rem; vertical-align:middle; }
  .day-card.past { opacity:0.4; }
  .no-match { display:none; text-align:center; padding:2rem 1rem; color:var(--text-dim); font-size:0.85rem; }
  .no-match.visible { display:block; }
  .content-area { display:none; } .content-area.visible { display:block; }

  /* ── キャンセル待ちボタン ── */
  .waitlist-area { padding:0.5rem 1rem 0.9rem; }
  .waitlist-btn {
    width:100%; padding:0.65rem; border:1.5px solid rgba(201,169,110,0.3);
    border-radius:10px; background:rgba(201,169,110,0.08); color:var(--gold-light);
    font-size:0.82rem; font-family:inherit; font-weight:600; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:0.4rem;
  }
  .waitlist-btn:hover { background:rgba(201,169,110,0.15); border-color:var(--gold); }
  .waitlist-btn:active { transform:scale(0.98); }

  /* ── モーダル ── */
  .modal-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7);
    z-index:1000; display:none; align-items:center; justify-content:center; padding:1rem;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--card); border-radius:18px; padding:2rem 1.5rem;
    max-width:340px; width:100%; border:1px solid var(--border); text-align:center;
    animation:modalIn 0.25s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .modal-icon { font-size:2.5rem; margin-bottom:0.8rem; }
  .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:0.5rem; }
  .modal-date { font-size:1rem; color:var(--gold); font-weight:700; margin-bottom:0.8rem; }
  .modal-desc { font-size:0.8rem; color:var(--text-dim); line-height:1.6; margin-bottom:1.2rem; }
  .modal-btn {
    width:100%; padding:0.8rem; border:none; border-radius:12px;
    font-size:0.9rem; font-family:inherit; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .modal-btn.secondary { background:rgba(255,255,255,0.06); color:var(--text-dim); }
  .modal-btn.secondary:hover { background:rgba(255,255,255,0.1); }
  .modal-chat-link {
    display:block; width:100%; padding:0.8rem; border:none; border-radius:12px;
    background:var(--gold); color:var(--bg); font-size:0.9rem; font-family:inherit;
    font-weight:700; cursor:pointer; text-decoration:none; text-align:center;
    margin-bottom:0.5rem; transition:all 0.2s;
  }
  .modal-chat-link:hover { background:var(--gold-light); }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Enchante' Hair</div>
  <h1 class="page-title">空き状況</h1>
  <div class="updated" id="dateRange"></div>
</div>
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  読み込み中...
</div>
<div class="error-msg" id="errorMsg">
  データを取得できませんでした。<br>しばらくしてから再度お試しください。
</div>
<div class="content-area" id="contentArea">
  <div class="menu-filter">
    <div class="menu-label">メニューで絞り込み</div>
    <div class="menu-chips">
      <button class="chip active" data-minutes="0">すべて</button>
      <button class="chip" data-minutes="30">カット <span class="chip-time">30分</span></button>
      <button class="chip" data-minutes="40">カット+シャンプー <span class="chip-time">40分</span></button>
      <button class="chip" data-minutes="50">カット+シャンプー+眉カット <span class="chip-time">50分</span></button>
      <button class="chip" data-minutes="60">会員コース <span class="chip-time">60分</span></button>
      <button class="chip" data-minutes="90">カット+カラー <span class="chip-time">90分</span></button>
      <button class="chip" data-minutes="120">パーマ <span class="chip-time">120分〜</span></button>
    </div>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span> 60分以上</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--gold)"></span> 30〜59分</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span> 30分未満</span>
  </div>
  <div class="schedule" id="schedule"></div>
  <div class="no-match" id="noMatch">選択したメニューに合う空き枠がありません 🙇</div>
</div>
<div class="footer">
  ご予約・お問い合わせはLINEから<br>
  ENCHANTE' HAIR
</div>

<!-- キャンセル待ちモーダル（LINEチャット誘導・全員共通） -->
<div class="modal-overlay" id="waitlistChatModal">
  <div class="modal">
    <div class="modal-icon">💬</div>
    <div class="modal-title">キャンセル待ち</div>
    <div class="modal-date" id="chatModalDate"></div>
    <div class="modal-desc">キャンセル待ちはLINEチャットで<br>お申し込みください🙏</div>
    <a class="modal-chat-link" href="https://line.me/R/oaMessage/@kbs5076i/?キャンセル待ち希望" id="chatLink">LINEチャットを開く</a>
    <button class="modal-btn secondary" id="chatModalCloseBtn">閉じる</button>
  </div>
</div>

<script>
const DOC_ID = '1L31it-00hRpTAZ0JG_YcH3ONKc5WA4GO71uV9qOeIT0';
const API_URL = 'https://script.google.com/macros/s/AKfycbxxgLMI6EpUIQBtwzYC7232rBJME2wJA6_JzmckvjkYiMvZdI6KGl9l_lKn2w6zhgzL/exec';

function parseDocText(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const data = [];
  for (const line of lines) {
    const dateMatch = line.match(/(\d{1,2})\/(\d{1,2})\(([日月火水木金土])\)/);
    if (!dateMatch) continue;
    const monthNum = parseInt(dateMatch[1]);
    const dayNum = parseInt(dateMatch[2]);
    const dow = dateMatch[3];
    const isClosed = line.includes('定休日');
    const isFull = !isClosed && line.includes('満席');
    const slots = [];
    if (!isFull && !isClosed) {
      const slotRegex = /(\d{1,2}:\d{2})\s*[~〜]\s*(\d{1,2}:\d{2})(\s*\(([^)]*)\))?/g;
      let match;
      while ((match = slotRegex.exec(line)) !== null) {
        const startStr = match[1], endStr = match[2], noteRaw = match[4] || '';
        const [sH,sM] = startStr.split(':').map(Number);
        const [eH,eM] = endStr.split(':').map(Number);
        const minutes = (eH*60+eM)-(sH*60+sM);
        const slot = { time: `${startStr}〜${endStr}`, minutes };
        const note = noteRaw.replace(/^✂️\s*/,'').trim();
        if (note) slot.note = note;
        slots.push(slot);
      }
    }
    data.push({ date:`${monthNum}/${dayNum}`, dow, month:`${monthNum}月`, day:dayNum, monthNum, full:isFull, closed:isClosed, slots });
  }
  return data;
}

let DATA = [], selectedMinutes = 0;
function getDurationClass(m) { return m>=60?'long':m>=30?'medium':'short'; }
function getDowClass(d) { return d==='土'?'sat':d==='日'?'sun':''; }
function getToday() { const n=new Date(); return {month:n.getMonth()+1, day:n.getDate()}; }

// 日付をyyyy-MM-dd形式に変換
function toDateStr(monthNum, day) {
  const year = new Date().getFullYear();
  const today = new Date();
  let y = year;
  if (monthNum < today.getMonth() + 1 - 6) y = year + 1;
  return `${y}-${String(monthNum).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

// 選択中のメニュー名を取得
function getSelectedMenuName() {
  const chip = document.querySelector('.chip.active');
  if (!chip) return '';
  const clone = chip.cloneNode(true);
  const t = clone.querySelector('.chip-time');
  if (t) t.remove();
  return clone.textContent.trim();
}

function render() {
  const container = document.getElementById('schedule');
  const noMatch = document.getElementById('noMatch');
  container.innerHTML = '';
  let hasVisible = false;
  const {month:todayM, day:todayD} = getToday();

  DATA.forEach(d => {
    const filteredSlots = selectedMinutes > 0 ? d.slots.filter(s => s.minutes >= selectedMinutes) : d.slots;
    const noMatchForMenu = selectedMinutes > 0 && !d.full && !d.closed && d.slots.length > 0 && filteredSlots.length === 0;

    if (!d.closed || selectedMinutes === 0) hasVisible = true;
    if (d.closed && selectedMinutes > 0) return;

    const isToday = d.monthNum === todayM && d.day === todayD;
    const isPast = !isToday && (d.monthNum < todayM || (d.monthNum === todayM && d.day < todayD));

    const card = document.createElement('div');
    card.className = `day-card ${d.closed?'':d.full||noMatchForMenu?'full':'available'} ${isPast?'past':''}`;

    // キャンセル待ちボタン（満席 or メニュー不足 & 未来日 & 定休日でないときのみ表示）
    let waitlistHtml = '';
    if ((d.full || noMatchForMenu) && !d.closed && !isPast) {
      waitlistHtml = `
        <div class="waitlist-area">
          <button class="waitlist-btn" data-date="${toDateStr(d.monthNum, d.day)}" data-label="${d.monthNum}月${d.day}日（${d.dow}）">
            🔔 キャンセル待ち
          </button>
        </div>`;
    }

    card.innerHTML = `
      <div class="day-header">
        <div class="day-left">
          <span class="day-date">${d.day}</span>
          <div class="day-meta">
            <span class="day-dow ${getDowClass(d.dow)}">${d.dow}${isToday?'<span class="today-indicator">TODAY</span>':''}</span>
            <span class="day-month">${d.month}</span>
          </div>
        </div>
        ${d.closed?'<span class="status-badge full">定休日</span>':d.full?'<span class="status-badge full">✕ 満席</span>':noMatchForMenu?'<span class="status-badge full">空き不足</span>':''}
      </div>
      ${!d.full && !d.closed && !noMatchForMenu?`<div class="slots">${filteredSlots.map(s=>`
        <span class="slot ${selectedMinutes>0?'highlight':''}">
          <span class="slot-duration ${getDurationClass(s.minutes)}"></span>
          ${s.time}
          ${s.note?`<span class="slot-note">✂️ ${s.note}</span>`:''}
        </span>`).join('')}</div>`:''}
      ${waitlistHtml}
    `;
    container.appendChild(card);
  });

  // キャンセル待ちボタン → 全員LINEチャットモーダルへ
  container.querySelectorAll('.waitlist-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dateLabel = btn.dataset.label;
      showChatModal(dateLabel);
    });
  });

  noMatch.className = hasVisible?'no-match':'no-match visible';
  if (DATA.length>0) document.getElementById('dateRange').textContent = `${DATA[0].date}〜${DATA[DATA.length-1].date}`;
}

// ── LINEチャット誘導モーダル（メニュー名付き） ──
function showChatModal(dateLabel) {
  const menuName = getSelectedMenuName();
  document.getElementById('chatModalDate').textContent = dateLabel;
  const menuText = menuName && menuName !== 'すべて' ? '\n希望メニュー：' + menuName : '';
  const chatUrl = `https://line.me/R/oaMessage/@kbs5076i/?${encodeURIComponent(dateLabel + 'のキャンセル待ち希望' + menuText)}`;
  document.getElementById('chatLink').href = chatUrl;
  document.getElementById('waitlistChatModal').classList.add('show');
}

document.getElementById('chatModalCloseBtn').addEventListener('click', () => {
  document.getElementById('waitlistChatModal').classList.remove('show');
});
document.getElementById('waitlistChatModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ── チップフィルター ──
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    selectedMinutes = parseInt(chip.dataset.minutes);
    render();
  });
});

// ── 初期化 ──
async function init() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const contentArea = document.getElementById('contentArea');
  try {
    const res = await fetch(API_URL, {redirect:'follow'});
    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('No text');
    DATA = parseDocText(text);
    if (DATA.length===0) throw new Error('No data parsed');
    loading.style.display = 'none';
    contentArea.classList.add('visible');
    render();
  } catch(e) {
    console.error('Load error:', e);
    loading.style.display = 'none';
    errorMsg.style.display = 'block';
  }
}
init();
</script>
</body>
</html>
